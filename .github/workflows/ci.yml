name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPS_IMAGE_NAME: esel-proc-deps
  DEPS_IMAGE_TAG: ci

jobs:
  deps-image:
    name: Build deps image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      image-ref: ${{ steps.image-ref.outputs.image-ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Export Docker build args
        run: |
          while IFS='=' read -r key value; do
            if [[ -z "${key}" || "${key}" == \#* ]]; then
              continue
            fi

            echo "${key}=${value}" >> "${GITHUB_ENV}"
          done < docker/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build esel-proc deps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfile
          target: esel-proc-deps
          tags: ${{ env.DEPS_IMAGE_NAME }}:${{ env.DEPS_IMAGE_TAG }}
          build-args: |
            workspace_dir=${{ env.workspace_dir }}
            ENV_RVGNU_INSTALL_DIR=${{ env.ENV_RVGNU_INSTALL_DIR }}
            ENV_SPIKE_INSTALL_DIR=${{ env.ENV_SPIKE_INSTALL_DIR }}
            ENV_RISCV=${{ env.ENV_RISCV }}
            ENV_RISCV_PREFIX_VAR=${{ env.ENV_RISCV_PREFIX_VAR }}
            ENV_RISCV_PREFIX=${{ env.ENV_RISCV_PREFIX }}
          cache-from: type=gha,scope=esel-proc-deps
          cache-to: type=gha,mode=max,scope=esel-proc-deps
          outputs: type=docker,dest=/tmp/esel-proc-deps.tar

      - name: Record image reference
        id: image-ref
        run: echo "image-ref=${DEPS_IMAGE_NAME}:${DEPS_IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Upload deps image artifact
        uses: actions/upload-artifact@v4
        with:
          name: esel-proc-deps-image
          path: /tmp/esel-proc-deps.tar
          if-no-files-found: error
          retention-days: 1

  build:
    strategy:
      matrix:
        SOL: ["01_multiplier", "02_divider", "03_squareroot", "04_median_filter", "05_missing_number", "06_rasterize_line", "07_number_of_inversions", "08_counting_sheep"]
        CPU: ["serv", "picorv32"]

    name: Build project (${{ matrix.SOL }})@${{ matrix.CPU }}
    runs-on: ubuntu-latest
    needs: deps-image
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download deps image artifact
        uses: actions/download-artifact@v4
        with:
          name: esel-proc-deps-image
          path: /tmp

      - name: Load deps image
        run: docker load --input /tmp/esel-proc-deps.tar

      - name: Build inside deps image
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/esel-proc-home \
            --env XDG_CACHE_HOME=/tmp/esel-proc-cache \
            --env XDG_CONFIG_HOME=/tmp/esel-proc-config \
            --volume "${GITHUB_WORKSPACE}:/work-esel-proc" \
            --workdir /work-esel-proc \
            "${{ needs.deps-image.outputs.image-ref }}" \
            bash -lc "
              set -euo pipefail
              mkdir -p /tmp/esel-proc-home /tmp/esel-proc-cache /tmp/esel-proc-config
              . utils/scripts/env_helper.sh docker/.env /.venv
              make CPU=${{ matrix.CPU }} SOL=${{ matrix.SOL }} 
            "

  test:
    strategy:
      matrix:
        SOL: ["01_multiplier", "02_divider", "03_squareroot", "04_median_filter", "08_counting_sheep"]
        CPU: ["serv", "picorv32"]

    name: Test project (${{ matrix.SOL }})@${{ matrix.CPU }}
    runs-on: ubuntu-latest
    needs: deps-image
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download deps image artifact
        uses: actions/download-artifact@v4
        with:
          name: esel-proc-deps-image
          path: /tmp

      - name: Load deps image
        run: docker load --input /tmp/esel-proc-deps.tar

      - name: Test inside deps image
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp/esel-proc-home \
            --env XDG_CACHE_HOME=/tmp/esel-proc-cache \
            --env XDG_CONFIG_HOME=/tmp/esel-proc-config \
            --volume "${GITHUB_WORKSPACE}:/work-esel-proc" \
            --workdir /work-esel-proc \
            "${{ needs.deps-image.outputs.image-ref }}" \
            bash -lc "
              set -euo pipefail
              mkdir -p /tmp/esel-proc-home /tmp/esel-proc-cache /tmp/esel-proc-config
              . utils/scripts/env_helper.sh docker/.env /.venv
              make test CPU=${{ matrix.CPU }} SOL=${{ matrix.SOL }} 
            "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esel-proc-build-${{ matrix.CPU }}-${{ matrix.SOL }}
          path: |
            build/rtl
            build/sw
          if-no-files-found: error
